<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/jpeg" href="/Student_Life_Prob_Solver/pwa_logo.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Life Problem Solver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B6914">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CLUTCH">
    <link rel="apple-touch-icon" href="/Student_Life_Prob_Solver/pwa_logo.jpg">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://student-life-backend-production.up.railway.app https://unpkg.com https://fonts.googleapis.com;">
    <script src="api.js"></script>
    <script>
        // Immediate auth check - if logged in, go to app
        (function() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.replace('app.html');
            }
        })();

        // Warm-up server on page load
        document.addEventListener('DOMContentLoaded', function() {
            try {
                fetch('https://student-life-backend-production.up.railway.app/health', { method: 'GET' });
            } catch (e) {
                // Silently ignore errors
            }
        });
    </script>
    <style>
        /* Auth Page Styles - Matching main theme */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, #FAFAFA 0%, #F5F5F5 50%, #E8E8E8 100%);
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .auth-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: linear-gradient(145deg, #FFFFFF 0%, #F8F9FA 100%);
            border: 1px solid var(--color-border, #ECF0F1);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .auth-card:hover::before {
            left: 100%;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo img {
            max-width: 80px;
            height: auto;
            border: 3px solid #FFD700;
            border-radius: 50%;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
            background: linear-gradient(145deg, #FFFFFF 0%, #F8F9FA 100%);
            padding: 4px;
        }

        .auth-title {
            text-align: center;
            font-size: 1.75rem;
            font-weight: 800;
            color: #2C3E50;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            text-align: center;
            color: #7F8C8D;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: #F8F9FA;
            padding: 0.375rem;
            border-radius: 12px;
        }

        .auth-tab {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            color: #7F8C8D;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: white;
            color: #2C3E50;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .auth-tab:hover:not(.active) {
            color: #34495E;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2C3E50;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            border: 2px solid #ECF0F1;
            border-radius: 10px;
            background: white;
            color: #34495E;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #B8860B;
            box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.15);
        }

        .form-input::placeholder {
            color: #7F8C8D;
        }

        .auth-submit {
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #2C3E50 0%, #B8860B 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-height: 52px;
        }

        .auth-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .auth-submit:hover::before {
            left: 100%;
        }

        .auth-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 62, 80, 0.35);
        }

        .auth-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-submit.loading {
            color: transparent;
        }

        .auth-submit.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auth-message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-message.show {
            display: block;
        }

        .auth-message.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .auth-message.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Doodles */
        .auth-doodle {
            position: absolute;
            font-size: 24px;
            opacity: 0.4;
            animation: float 4s ease-in-out infinite;
            pointer-events: none;
        }

        .auth-doodle-1 { top: 15%; left: 10%; animation-delay: 0s; }
        .auth-doodle-2 { top: 20%; right: 10%; animation-delay: 1s; }
        .auth-doodle-3 { bottom: 20%; left: 8%; animation-delay: 2s; }
        .auth-doodle-4 { bottom: 15%; right: 12%; animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(8deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-page {
                padding: 1rem;
                align-items: flex-start;
                padding-top: 3rem;
            }

            .auth-card {
                padding: 1.75rem;
            }

            .auth-title {
                font-size: 1.5rem;
            }

            .auth-logo img {
                max-width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <span class="auth-doodle auth-doodle-1">⭐</span>
        <span class="auth-doodle auth-doodle-2">✨</span>
        <span class="auth-doodle auth-doodle-3">🚀</span>
        <span class="auth-doodle auth-doodle-4">💡</span>

        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <img src="logo.png" alt="CLUTCH Logo">
                </div>

                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to access your student toolkit</p>

                <div id="authMessage" class="auth-message"></div>

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                    <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="auth-submit" id="loginBtn">Sign In</button>
                </form>

                <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label" for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" class="form-input" placeholder="Create a password (min 6 chars)" required minlength="6">
                    </div>
                    <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.querySelector('.auth-title').textContent = 'Welcome Back';
                document.querySelector('.auth-subtitle').textContent = 'Sign in to access your student toolkit';
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
                document.querySelector('.auth-title').textContent = 'Create Account';
                document.querySelector('.auth-subtitle').textContent = 'Join CLUTCH and start organizing your student life';
            }
            hideMessage();
        }

        function showMessage(message, type) {
            const msgEl = document.getElementById('authMessage');
            msgEl.textContent = message;
            msgEl.className = `auth-message ${type} show`;
        }

        function hideMessage() {
            document.getElementById('authMessage').classList.remove('show');
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.classList.toggle('loading', loading);
        }

        async function handleLogin(e, retryCount = 0) {
            e.preventDefault();
            if (retryCount === 0) hideMessage();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            // Set button to loading state
            btn.disabled = true;
            btn.classList.add('loading');

            console.log('[Auth] Attempting login for:', email, retryCount > 0 ? `(retry ${retryCount})` : '');

            try {
                const data = await apiLogin(email, password);

                if (data.success && data.token) {
                    // Clear stale data and save new token
                    clearAllUserState();
                    localStorage.setItem('token', data.token);
                    console.log('[Auth] Login successful, redirecting...');
                    window.location.replace('app.html');
                } else {
                    showMessage(data.message || 'Login failed. Please check your credentials.', 'error');
                    btn.disabled = false;
                    btn.classList.remove('loading');
                }
            } catch (error) {
                console.error('[Auth] Login error:', error);

                // Check if it's a network/timeout error
                const isNetworkError = error.name === 'TypeError' ||
                                       error.message?.includes('Failed to fetch') ||
                                       error.isTimeout;

                if (isNetworkError && retryCount < 3) {
                    // Show friendly retry message
                    showMessage('Connecting to server, retrying in 5 seconds...', 'error');

                    // Wait 5 seconds then retry
                    setTimeout(() => {
                        handleLogin(e, retryCount + 1);
                    }, 5000);
                    return; // Keep button disabled during retry wait
                }

                // Max retries reached or other error
                if (isNetworkError) {
                    showMessage('Server is taking too long to respond. Please try again in a moment.', 'error');
                } else {
                    showMessage(error.message || 'Login failed. Please try again.', 'error');
                }

                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            hideMessage();
            setLoading('signupBtn', true);

            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            console.log('[Auth] Attempting signup for:', email);

            try {
                const data = await apiFetch('/api/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                if (data.success) {
                    showMessage('Account created! Please sign in.', 'success');
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginEmail').value = email;
                    }, 1000);
                } else {
                    showMessage(data.message || 'Signup failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('[Auth] Signup error:', error);

                // Check if it's a network/timeout error
                const isNetworkError = error.name === 'TypeError' ||
                                       error.message?.includes('Failed to fetch') ||
                                       error.isTimeout;

                if (isNetworkError) {
                    showMessage('Server is taking too long to respond. Please try again in a moment.', 'error');
                } else {
                    showMessage(error.message || 'Signup failed. Please try again.', 'error');
                }
            } finally {
                setLoading('signupBtn', false);
            }
        }
    </script>
</body>
</html>
