    <script>
const GROQ_API_KEY = "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";

let conversationHistory = [];
let isWaiting = false;

function appendBubble(text, sender) {
  const box = document.getElementById("chat-messages");
  if (!box) return;
  const div = document.createElement("div");
  div.className = sender === "user" ? "user-bubble" : "ai-bubble";
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping(show) {
  const t = document.getElementById("typing-indicator");
  if (t) t.style.display = show ? "block" : "none";
}

async function sendHumeMessage() {
  if (isWaiting) return;
  const input = document.getElementById("chat-input");
  if (!input) return;
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  appendBubble(message, "user");
  showTyping(true);
  isWaiting = true;

  conversationHistory.push({
    role: "user",
    content: message
  });

  const requestBody = {
    model: "llama3-8b-8192",
    messages: [
      {
        role: "system",
        content: "You are CLUTCH AI, a warm and friendly emotional support companion for students. Listen and uplift their mood. Keep responses to 2-3 sentences max. Ask only one question at a time."
      },
      ...conversationHistory
    ],
    max_tokens: 150,
    temperature: 0.7
  };

  console.log("Using Groq key starting with:", GROQ_API_KEY.substring(0, 8));

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_API_KEY
      },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
      const errorText = await response.text();
      console.error("Groq HTTP error:", response.status, errorText);
      throw new Error("HTTP " + response.status);
    }

    const data = await response.json();
    console.log("Groq response:", data);

    if (data.choices && data.choices.length > 0) {
      const reply = data.choices[0].message.content.trim();
      conversationHistory.push({
        role: "assistant",
        content: reply
      });
      showTyping(false);
      appendBubble(reply, "ai");
    } else {
      throw new Error("No choices in response");
    }

  } catch (err) {
    console.error("Groq error:", err);
    showTyping(false);
    appendBubble("Oops, I zoned out for a sec! Try again? 😅", "ai");
    if (conversationHistory[conversationHistory.length - 1]?.role === "user") {
      conversationHistory.pop();
    }
  } finally {
    isWaiting = false;
  }
}

document.addEventListener("DOMContentLoaded", function() {
  if (new URLSearchParams(window.location.search).get("tool") === "clutchai") {
    const sendBtn = document.getElementById("send-btn");
    const chatInput = document.getElementById("chat-input");

    if (sendBtn) sendBtn.addEventListener("click", sendHumeMessage);
    if (chatInput) {
      chatInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          sendHumeMessage();
        }
      });
    }
  }
});
</script>
