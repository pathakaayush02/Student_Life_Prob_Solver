        /* Auth verification loading state */
        #auth-checking {
            position: fixed;

            width: 48px;

            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        // IMMEDIATE TOKEN CHECK - redirect if no token, otherwise show workspace immediately
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.replace('index.html');
                return;
            }

            // Show workspace immediately - don't block on API call
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('auth-checking').classList.add('hidden');
            });

            // Background token verification with timeout
            async function verifyToken() {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout

                try {
                    console.log('Verifying token with /api/auth/me...');
                    const res = await fetch('https://student-life-backend-1.onrender.com/api/auth/me', {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        cache: 'no-store',
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    console.log('Auth verification response status:', res.status);

                    if (!res.ok) {
                        console.error('Token verification failed, status:', res.status);
                        localStorage.removeItem('token');
                        window.location.replace('index.html');
                        return;
                    }

                    const data = await res.json();
                    console.log('Auth verification response data:', data);

                    if (!data.success || !data.user) {
                        console.error('Invalid user data from /api/auth/me');
                        localStorage.removeItem('token');
                        window.location.replace('index.html');
                        return;
                    }

                    console.log('User verified:', data.user.email);

                } catch (error) {
                    clearTimeout(timeoutId);
                    if (error.name === 'AbortError') {
                        console.error('Auth verification timeout after 10s');
                    } else {
                        console.error('Auth verification error:', error.message);
                    }
                    // On network/timeout error, still allow workspace use
                    // The next API call will fail if token is truly invalid
                }
            }

            // Run verification in background - don't block page render
            setTimeout(verifyToken, 100);
        })();
    </script>

    <script>
const GROQ_API_KEY = "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";
let conversationHistory = [];
let isWaiting = false;

function appendBubble(text, sender) {
  const box = document.getElementById("chat-messages");
  if (!box) return;
  const div = document.createElement("div");
  div.className = sender === "user" ? "user-bubble" : "ai-bubble";
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping(show) {
  const t = document.getElementById("typing-indicator");
  if (t) t.style.display = show ? "block" : "none";
}

async function sendHumeMessage() {
  if (isWaiting) return;
  const input = document.getElementById("chat-input");
  if (!input) return;
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  appendBubble(message, "user");
  showTyping(true);
  isWaiting = true;

  conversationHistory.push({ role: "user", content: message });

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_API_KEY
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        temperature: 0.7,
        max_tokens: 150,
        messages: [
          {
            role: "system",
            content: "You are CLUTCH AI, a warm friendly emotional support companion for students. Listen and uplift their mood. Keep every response to 2-3 sentences max. Ask only one question at a time then stop and wait for user to reply. Never send multiple messages."
          },
          ...conversationHistory
        ]
      })
    });

    console.log("Groq status:", res.status);

    if (!res.ok) {
      const errText = await res.text();
      console.error("Groq error body:", errText);
      throw new Error("Status " + res.status + ": " + errText);
    }

    const data = await res.json();
    const reply = data.choices[0].message.content.trim();
    conversationHistory.push({ role: "assistant", content: reply });
    showTyping(false);
    appendBubble(reply, "ai");

  } catch (err) {
    console.error("Full error:", err.message);
    showTyping(false);
    appendBubble("Error: " + err.message, "ai");
    conversationHistory.pop();
  } finally {
    isWaiting = false;
  }
}

document.addEventListener("DOMContentLoaded", function () {
  if (new URLSearchParams(window.location.search).get("tool") === "clutchai") {
    const sendBtn = document.getElementById("send-btn");
    const chatInput = document.getElementById("chat-input");
    if (sendBtn) sendBtn.addEventListener("click", sendHumeMessage);
    if (chatInput) {
      chatInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); sendHumeMessage(); }
      });
    }
  }
});
</script>

            'sl_savings_points',
            'slps_stress',

        keysToRemove.forEach(key => localStorage.removeItem(key));
        console.log('All user state cleared');

};

// Logout function
function logout() {
    if (confirm('Are you sure you want to logout?')) {
        window.AppState.clearAll();
        window.location.replace('index.html');
    }
}

document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("a[href]").forEach(function(link) {
    const href = link.getAttribute("href");
    if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto")) return;
    link.addEventListener("click", function(e) {
      e.preventDefault();
      document.body.style.transition = "opacity 0.3s ease, transform 0.3s ease";
      document.body.style.opacity = "0";
      document.body.style.transform = "translateY(-12px)";
      setTimeout(function() {
        window.location.href = href;
      }, 300);
    });
  });
});
</script>
