<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace | Student Life Problem Solver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="workspace-page">
    <a href="#main" class="skip-link">Skip to main content</a>
    
    <nav class="top-nav">
        <div class="container">
            <div class="nav-content">
                <div class="breadcrumb" id="breadcrumb">
                    <a href="index.html" class="breadcrumb-item">Home</a>
                    <span class="breadcrumb-separator">></span>
                    <span class="breadcrumb-item active" id="toolNameBreadcrumb">Tool</span>
                </div>
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
        </div>
    </nav>

    <main id="main" class="container">
        <div id="toolWorkspace" class="workspace-container">
            <!-- Tool content will be injected here by JavaScript -->
            <div class="text-center">
                <div class="tool-icon-large">
                    <i data-lucide="loader-2" width="32" height="32"></i>
                </div>
                <p class="text-muted">Loading tool...</p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-links">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSd9VF4FiCjKlkKU8ktZ4zb5EFn6d158yx3F82NLGf09Ohgd2g/viewform?usp=dialog" 
                   target="_blank" 
                   rel="noopener">Feedback</a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSe6nYD_lLoes6Zy4NjtTU-vK3_RiAi3dzfyId7WUJ3dbGVVJg/viewform?usp=dialog" 
                   target="_blank" 
                   rel="noopener">Take Survey</a>
            </div>
            <p>&copy; 2026 Student Life Problem Solver</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
