    <script type="module">
import { HumeClient } from "https://esm.sh/hume@0.7.5";

const HUME_API_KEY = "39QXmlAZK5oA3IiB98FRvGj66nwAJBMNoEo3QQue4vhMXjzx";
const HUME_CONFIG_ID = "45141556-c90a-41bc-a780-42c7a74ae8c3";

let socket = null;
let isConnecting = false;

function appendBubble(text, sender) {
  const box = document.getElementById("chat-messages");
  if (!box) return;
  const div = document.createElement("div");
  div.className = sender === "user" ? "user-bubble" : "ai-bubble";
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping(show) {
  const t = document.getElementById("typing-indicator");
  if (t) t.style.display = show ? "block" : "none";
}

async function initHume() {
  if (socket || isConnecting) return;
  isConnecting = true;

  try {
    const client = new HumeClient({ apiKey: HUME_API_KEY });

    socket = await client.empathicVoice.chat.connect({
      configId: HUME_CONFIG_ID,
      onMessage: (message) => {
        if (message.type === "assistant_message") {
          const text = message.message?.content;
          if (!text) return;

          showTyping(false);
          appendBubble(text, "ai");

          const emotions = message.models?.prosody?.scores;
          if (emotions) {
            const top = Object.entries(emotions).sort((a, b) => b[1] - a[1])[0];
            if (top) {
              const bar = document.getElementById("emotion-bar");
              const label = document.getElementById("emotion-label");
              if (bar && label) {
                bar.style.display = "block";
                label.textContent = top[0].charAt(0).toUpperCase() + top[0].slice(1);
              }
            }
          }
        }
      },
      onError: (err) => {
        console.error("Hume error:", err);
        showTyping(false);
        appendBubble("I lost connection for a sec! Try again? 😅", "ai");
        socket = null;
        isConnecting = false;
      },
      onClose: () => {
        socket = null;
        isConnecting = false;
      }
    });

    isConnecting = false;
    console.log("Hume connected successfully");

  } catch (err) {
    console.error("Hume init failed:", err);
    isConnecting = false;
    socket = null;
    appendBubble("Couldn't connect right now. Please refresh and try again! 😅", "ai");
  }
}

async function sendHumeMessage() {
  const input = document.getElementById("chat-input");
  if (!input) return;
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  appendBubble(message, "user");
  showTyping(true);

  if (!socket) {
    await initHume();
  }

  if (socket) {
    try {
      socket.sendUserInput(message);
    } catch (err) {
      console.error("Send error:", err);
      showTyping(false);
      appendBubble("Something went wrong sending that. Try again! 😅", "ai");
      socket = null;
    }
  }
}

if (new URLSearchParams(window.location.search).get("tool") === "clutchai") {
  const sendBtn = document.getElementById("send-btn");
  const chatInput = document.getElementById("chat-input");

  if (sendBtn) sendBtn.addEventListener("click", sendHumeMessage);
  if (chatInput) {
    chatInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        sendHumeMessage();
      }
    });
  }

  initHume();
}
</script>
