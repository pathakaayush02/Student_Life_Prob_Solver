    <script>
const HUME_API_KEY = "39QXmlAZK5oA3IiB98FRvGj66nwAJBMNoEo3QQue4vhMXjzx";
const HUME_CONFIG_ID = "45141556-c90a-41bc-a780-42c7a74ae8c3";

let ws = null;
let userHasSpoken = false;
let waitingForUser = false;
let reconnectAttempts = 0;
const MAX_RECONNECTS = 3;

function appendBubble(text, sender) {
  const box = document.getElementById("chat-messages");
  if (!box) return;
  const div = document.createElement("div");
  div.className = sender === "user" ? "user-bubble" : "ai-bubble";
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping(show) {
  const t = document.getElementById("typing-indicator");
  if (t) t.style.display = show ? "block" : "none";
}

function connectHume(onReady) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    if (onReady) onReady();
    return;
  }

  const url = `wss://api.hume.ai/v0/evi/chat?api_key=${HUME_API_KEY}&config_id=${HUME_CONFIG_ID}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    console.log("Hume connected");
    reconnectAttempts = 0;
    if (onReady) onReady();
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      console.log("Hume message type:", data.type);

      if (data.type === "assistant_message") {
        const text = data.message?.content;
        if (!text) return;
        if (!userHasSpoken) return;
        if (waitingForUser) return;

        showTyping(false);
        appendBubble(text, "ai");
        waitingForUser = true;
      }

      if (data.type === "error") {
        console.error("Hume server error:", data);
        showTyping(false);
        appendBubble("Hmm, something went wrong on my end. Try sending again! 😅", "ai");
        waitingForUser = true;
      }

    } catch (err) {
      console.error("Parse error:", err);
    }
  };

  ws.onerror = (err) => {
    console.error("WebSocket error:", err);
    ws = null;
  };

  ws.onclose = (event) => {
    console.log("Hume closed, code:", event.code, "reason:", event.reason);
    ws = null;

    if (event.code === 1008) {
      appendBubble("Connection failed — please check your API key is valid.", "ai");
      return;
    }

    if (event.code === 1011) {
      appendBubble("Hume server error. Please try refreshing the page.", "ai");
      return;
    }
  };
}

function sendHumeMessage() {
  const input = document.getElementById("chat-input");
  if (!input) return;
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  appendBubble(message, "user");
  showTyping(true);
  userHasSpoken = true;
  waitingForUser = false;

  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectHume(() => {
      setTimeout(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: "user_input",
            text: message
          }));
        } else {
          showTyping(false);
          appendBubble("Couldn't connect. Please refresh and try again! 😅", "ai");
        }
      }, 1500);
    });
    return;
  }

  ws.send(JSON.stringify({
    type: "user_input",
    text: message
  }));
}

document.addEventListener("DOMContentLoaded", function() {
  if (new URLSearchParams(window.location.search).get("tool") === "clutchai") {
    const sendBtn = document.getElementById("send-btn");
    const chatInput = document.getElementById("chat-input");

    if (sendBtn) sendBtn.addEventListener("click", sendHumeMessage);
    if (chatInput) {
      chatInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          sendHumeMessage();
        }
      });
    }

    connectHume();
  }
});
</script>
