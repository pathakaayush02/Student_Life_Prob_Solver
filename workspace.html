    <script>
function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("clutch_theme", next);
  document.getElementById("theme-toggle").textContent = next === "dark" ? "☀️" : "🌙";
}

function loadTheme() {
  const saved = localStorage.getItem("clutch_theme") || "light";
  document.documentElement.setAttribute("data-theme", saved);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = saved === "dark" ? "☀️" : "🌙";
}

loadTheme();
</script>

    <script>
const GROQ_API_KEY = "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";
let conversationHistory = [];
let isWaiting = false;

function appendBubble(text, sender) {
  const box = document.getElementById("chat-messages");
  if (!box) return;
  const div = document.createElement("div");
  div.className = sender === "user" ? "user-bubble" : "ai-bubble";
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping(show) {
  const t = document.getElementById("typing-indicator");
  if (t) t.style.display = show ? "block" : "none";
}

async function sendHumeMessage() {
  if (isWaiting) return;
  const input = document.getElementById("chat-input");
  if (!input) return;
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  appendBubble(message, "user");
  showTyping(true);
  isWaiting = true;

  conversationHistory.push({ role: "user", content: message });

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_API_KEY
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        temperature: 0.7,
        max_tokens: 150,
        messages: [
          {
            role: "system",
            content: "You are CLUTCH AI, a warm friendly emotional support companion for students. Listen and uplift their mood. Keep every response to 2-3 sentences max. Ask only one question at a time then stop and wait for user to reply. Never send multiple messages."
          },
          ...conversationHistory
        ]
      })
    });

    console.log("Groq status:", res.status);

    if (!res.ok) {
      const errText = await res.text();
      console.error("Groq error body:", errText);
      throw new Error("Status " + res.status + ": " + errText);
    }

    const data = await res.json();
    const reply = data.choices[0].message.content.trim();
    conversationHistory.push({ role: "assistant", content: reply });
    showTyping(false);
    appendBubble(reply, "ai");

  } catch (err) {
    console.error("Full error:", err.message);
    showTyping(false);
    appendBubble("Error: " + err.message, "ai");
    conversationHistory.pop();
  } finally {
    isWaiting = false;
  }
}

document.addEventListener("DOMContentLoaded", function () {
  if (new URLSearchParams(window.location.search).get("tool") === "clutchai") {
    const sendBtn = document.getElementById("send-btn");
    const chatInput = document.getElementById("chat-input");
    if (sendBtn) sendBtn.addEventListener("click", sendHumeMessage);
    if (chatInput) {
      chatInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); sendHumeMessage(); }
      });
    }
  }
});
</script>
