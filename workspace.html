    <style>
        /* Auth verification loading state */
        #auth-checking {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FAFAFA 0%, #F5F5F5 50%, #E8E8E8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        #auth-checking.hidden {
            display: none;
        }
        .auth-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(184, 134, 11, 0.2);
            border-top-color: #B8860B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Global auth state
        window.AuthState = {
            verified: false,
            user: null,
            onVerified: []
        };

        // IMMEDIATE TOKEN CHECK - redirect if no token
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.replace('index.html');
                return;
            }

            // Background token verification - keep loading overlay until done
            async function verifyToken() {
                // Fallback: always hide overlay after max 8 seconds (cold start protection)
                const maxWaitTimeout = setTimeout(() => {
                    console.log('[Auth] Max wait time reached, hiding overlay');
                    document.getElementById('auth-checking').classList.add('hidden');
                    if (!window.AuthState.verified) {
                        window.AuthState.verified = true;
                        window.AuthState.onVerified.forEach(callback => {
                            try { callback(); } catch (e) { console.error(e); }
                        });
                    }
                }, 8000);

                try {
                    console.log('[Auth] Verifying token...');
                    const data = await apiVerifyToken();
                    console.log('[Auth] User verified:', data.user?.email);

                    window.AuthState.verified = true;
                    window.AuthState.user = data.user;

                    // Display user email in header
                    const userInfo = document.getElementById('userInfo');
                    if (userInfo && data.user?.email) {
                        userInfo.textContent = data.user.email;
                    }

                    // Hide loading overlay now that auth is verified
                    clearTimeout(maxWaitTimeout);
                    document.getElementById('auth-checking').classList.add('hidden');

                    // Trigger callbacks
                    window.AuthState.onVerified.forEach(callback => {
                        try { callback(); } catch (e) { console.error(e); }
                    });
                } catch (error) {
                    console.error('[Auth] Verification failed:', error.message);
                    clearTimeout(maxWaitTimeout);
                    if (error.status === 401 || error.status === 403) {
                        clearAllUserState();
                        window.location.replace('index.html');
                        return;
                    }
                    // For network/timeout errors, still allow app use but hide overlay
                    window.AuthState.verified = true;
                    document.getElementById('auth-checking').classList.add('hidden');
                    window.AuthState.onVerified.forEach(callback => {
                        try { callback(); } catch (e) { console.error(e); }
                    });
                }
            }

            // Run verification immediately
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', verifyToken);
            } else {
                verifyToken();
            }
        })();
    </script>

    <script>
// CLUTCH AI - Secure backend integration
let isWaiting = false;

function appendBubble(text, sender) {
  const box = document.getElementById("chat-messages");
  if (!box) return;
  const div = document.createElement("div");
  div.className = sender === "user" ? "user-bubble" : "ai-bubble";
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping(show) {
  const t = document.getElementById("typing-indicator");
  if (t) t.style.display = show ? "block" : "none";
}

async function loadChatHistory() {
  const token = localStorage.getItem('token');
  if (!token) return;

  try {
    const res = await fetch('https://student-life-backend-production.up.railway.app/api/clutch-ai/history', {
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      cache: 'no-store'
    });

    if (res.status === 401) {
      clearAllUserState();
      window.location.replace('index.html');
      return;
    }

    if (!res.ok) throw new Error('Failed to load history');

    const data = await res.json();
    const messages = data.history || [];

    // Clear default welcome message
    const box = document.getElementById("chat-messages");
    if (box && messages.length > 0) {
      box.innerHTML = '';
      messages.forEach(msg => {
        appendBubble(msg.content, msg.role === 'user' ? 'user' : 'ai');
      });
    }
  } catch (err) {
    console.error('[CLUTCH AI] Failed to load history:', err);
  }
}

async function sendHumeMessage() {
  if (isWaiting) return;

  const input = document.getElementById("chat-input");
  if (!input) return;

  const message = input.value.trim();
  if (!message) return;

  const token = localStorage.getItem('token');
  if (!token) {
    alert('Please login');
    return;
  }

  // Immediately show user message
  input.value = "";
  appendBubble(message, "user");
  showTyping(true);
  isWaiting = true;

  try {
    const res = await fetch('https://student-life-backend-production.up.railway.app/api/clutch-ai/chat', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      cache: 'no-store',
      body: JSON.stringify({ message: message })
    });

    // Handle auth errors
    if (res.status === 401) {
      clearAllUserState();
      window.location.replace('index.html');
      return;
    }

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.message || `Status ${res.status}`);
    }

    const data = await res.json();
    const reply = data.reply || data.response || data.message;

    if (!reply) {
      throw new Error('No reply from AI');
    }

    showTyping(false);
    appendBubble(reply, "ai");

  } catch (err) {
    console.error('[CLUTCH AI] Error:', err);
    showTyping(false);
    appendBubble("Sorry, I'm having trouble connecting. Please try again in a moment.", "ai");
  } finally {
    isWaiting = false;
  }
}

document.addEventListener("DOMContentLoaded", function () {
  if (new URLSearchParams(window.location.search).get("tool") === "clutchai") {
    // Load chat history on tool init
    loadChatHistory();

    const sendBtn = document.getElementById("send-btn");
    const chatInput = document.getElementById("chat-input");

    if (sendBtn) sendBtn.addEventListener("click", sendHumeMessage);
    if (chatInput) {
      chatInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); sendHumeMessage(); }
      });
    }
  }
});
</script>
<style>

<script>
// Global state management
window.AppState = {
    currentUser: null,
    studyPlans: [],
    xp: 0,
    clearAll: function() {
        this.currentUser = null;
        this.studyPlans = [];
        this.xp = 0;
        clearAllUserState(); // From api.js
    }
};

// Logout function
function logout() {
    if (confirm('Are you sure you want to logout?')) {
        window.AppState.clearAll();
        window.location.replace('index.html');
    }
}

document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("a[href]").forEach(function(link) {
    const href = link.getAttribute("href");
    if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto")) return;
    link.addEventListener("click", function(e) {
      e.preventDefault();
      document.body.style.transition = "opacity 0.3s ease, transform 0.3s ease";
      document.body.style.opacity = "0";
      document.body.style.transform = "translateY(-12px)";
      setTimeout(function() {
        window.location.href = href;
      }, 300);
    });
  });
});
</script>
